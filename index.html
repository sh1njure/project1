  <meta charset="UTF-8">
  <title>🧸 Toy Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
    }

    .cart {
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
    }

    .search {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      margin-bottom: 25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
    }

    .price {
      color: #ff4d4d;
      font-weight: bold;
      font-size: 18px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #ff6b6b, #ff9f43);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 40px;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h1>🧸 Toy Store</h1>
  <div class="cart">🛒 <span id="cart">0</span></div>
</header>

<div class="container">
  <input class="search" id="search" placeholder="Search for toys..." />

  <div class="grid" id="products"></div>
</div>

<footer>
   © 2026 Toy Store — made by you 
</footer>

<script>
  const products = [
    { name: "Teddy Bear", price: 25, img: "https://images.unsplash.com/photo-1601758123927-196d5b3b7c3a" },
    { name: "LEGO Set", price: 40, img: "https://images.unsplash.com/photo-1587654780291-39c9404d746b" },
    { name: "Toy Car", price: 15, img: "https://images.unsplash.com/photo-1616627450609-6c8b5fbc0b28" },
    { name: "Doll", price: 30, img: "https://images.unsplash.com/photo-1596464716127-f2a82984de30" }
  ];

  let cart = 0;

  function render(list) {
    const container = document.getElementById("products");
    container.innerHTML = "";

    list.forEach(p => {
      container.innerHTML += `
        <div class="card">
          <img src="${p.img}">
          <div class="card-content">
            <h3>${p.name}</h3>
            <p class="price">€${p.price}</p>
            <button onclick="addToCart()">Добавить в корзину</button>
          </div>
        </div>
      `;
    });
  }

  function addToCart() {
    cart++;
    document.getElementById("cart").innerText = cart;
  }

  document.getElementById("search").addEventListener("input", (e) => {
    const value = e.target.value.toLowerCase();
    const filtered = products.filter(p => p.name.toLowerCase().includes(value));
    render(filtered);
  });

  render(products);
</script>

</body>
</html>
